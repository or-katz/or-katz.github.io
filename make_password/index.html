    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&family=Roboto+Mono:wght@500;700&display=swap');
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f3f4f6;
        }

        .word-display {
            font-family: 'Roboto Mono', monospace;
            transition: all 0.3s ease;
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-100 via-purple-50 to-blue-100">

    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-lg border border-gray-100">
        
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Phonotactic Password Generator</h1>
            <p class="text-gray-500 text-sm">Generates highly readable, syntactically perfect passwords. No double letters, easy to pronounce.</p>
        </header>

        <!-- אזור תצוגת הסיסמה -->
        <div class="bg-gray-50 rounded-2xl p-8 mb-6 text-center border-2 border-indigo-50 shadow-inner relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-400 to-purple-500"></div>
            
            <p id="wordOutput" class="word-display font-bold text-indigo-900 tracking-tighter break-words w-full mx-auto py-6">
                Welcome
            </p>
        </div>

        <!-- כפתור העתקה -->
        <div class="flex justify-center mb-8">
            <button id="copyBtn" class="flex items-center gap-2 px-6 py-2 bg-white text-indigo-600 rounded-full shadow-md border border-indigo-100 transition-all hover:bg-indigo-50 hover:scale-105 active:scale-95 font-bold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="copyIcon"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                <span id="copyBtnLabel">Copy Password</span>
            </button>
        </div>

        <!-- פקדים ובקרות -->
        <div class="space-y-4">
            <div class="flex flex-col gap-3 mb-4">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-bold text-gray-700">Password Length (characters):</label>
                    <span id="lengthValue" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg border border-indigo-100 shadow-sm">8</span>
                </div>
                <!-- ברירת מחדל שונתה ל-8 -->
                <input type="range" id="lengthSlider" min="4" max="25" value="8" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div id="specialCharsWrapper" class="flex items-center gap-2 mb-2">
                <input type="checkbox" id="specialCharsCheckbox" class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                <label for="specialCharsCheckbox" class="text-sm font-bold text-gray-700 cursor-pointer">Include separators (@ # % & ? ! * - _ + =)</label>
            </div>

            <div class="flex items-center gap-2 mb-4">
                <input type="checkbox" id="numbersCheckbox" checked class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                <label for="numbersCheckbox" class="text-sm font-bold text-gray-700 cursor-pointer">Append random numbers (0-999)</label>
            </div>

            <button id="generateBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-300 text-lg">
                Generate Password ✨
            </button>
        </div>

    </div>

    <script>
        // --- מילונים מסוננים קפדנית (ללא אותיות כפולות כלל) ---
        
        const vowels = ['a', 'e', 'i', 'o', 'u', 'y']; 
        // ללא ee, oo
        const vowelPairs = ['ea', 'ou', 'ai', 'oa', 'ie', 'ei', 'au', 'ay', 'ey', 'oi', 'oy'];
        
        const consonants = ['b', 'c', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'r', 's', 't', 'v', 'w', 'x', 'z'];
        // ללא 3 עיצורים ברצף, ללא כפילויות
        const initialBlends = ['bl', 'br', 'ch', 'cl', 'cr', 'dr', 'fl', 'fr', 'gl', 'gr', 'pl', 'pr', 'sh', 'sl', 'sm', 'sn', 'sp', 'st', 'th', 'tr', 'wh', 'ph', 'qu', 'sw', 'tw'];
        const medialBlends = ['ch', 'sh', 'th', 'ph', 'st', 'nd', 'nt', 'ng', 'rt', 'lt', 'rm', 'rn', 'mb', 'mp'];
        const finalBlends = ['ch', 'ck', 'ft', 'ld', 'nd', 'ng', 'nk', 'nt', 'ph', 'rd', 'rk', 'rt', 'sh', 'sk', 'sp', 'st', 'th', 'mp', 'rn', 'rm'];
        
        const prefixes = ['re', 'un', 'in', 'ex', 'de', 'pro', 'con', 'pre', 'over', 'sub', 'dis', 'mis', 'out', 'en', 'mega', 'cyber', 'neo', 'retro', 'astro'];
        // ללא ness, less (מכילות ss)
        const suffixes = ['tion', 'ing', 'er', 'ment', 'able', 'ous', 'ify', 'ity', 'ish', 'ic', 'dom', 'ful', 'ism', 'ship', 'punk', 'wave', 'logy'];

        // --- פונקציות עזר ---

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function chance(percentage) {
            return Math.random() * 100 < percentage;
        }

        function isVowel(char) {
            return ['a','e','i','o','u','y'].includes(char.toLowerCase());
        }

        // --- מנגנון וידוא לוגיקה תחבירית מורחב וקפדני ---
        function isLogicalFinal(text) {
            const lower = text.toLowerCase();
            
            // 1. איסור מוחלט על כל אות כפולה
            if (/([a-z])\1/i.test(lower)) return false;
            
            // 2. איסור על 3 עיצורים רצופים (מבטיח קריאות והגייה קלה)
            if (/[^aeiouy]{3,}/i.test(lower)) return false;
            
            // 3. איסור על 3 תנועות רצופות
            if (/[aeiouy]{3,}/i.test(lower)) return false;
            
            // 4. מניעת סיומות בעייתיות להגייה
            if (/[vjqx]$/i.test(lower)) return false;

            // 5. מניעת רצפים קשים פונטית 
            const illegalPairs = [
                'cj', 'vj', 'qc', 'qg', 'qk', 'qv', 'qw', 'qx', 'qz', 
                'hh', 'pq', 'zk', 'zh', 'wp', 'bf', 'hx', 'xj', 'zx', 'cv', 'mx',
                'xw', 'wx', 'jw', 'wj', 'kg', 'gk', 'pb', 'bp', 'td', 'dt', 'cg', 'gc',
                'sz', 'zs', 'iy', 'yi', 'uy', 'yu'
            ];
            for (let pair of illegalPairs) {
                if (lower.includes(pair)) return false;
            }

            return true;
        }

        // --- מנוע הרכבת החלקים לפי State Machine ---
        function generateRandomSequence(targetL) {
            let seq = "";
            let usePrefix = targetL >= 6 ? chance(25) : false;
            let useSuffix = targetL >= 6 ? chance(25) : false;
            
            let currentType = chance(50) ? 'V' : 'C';

            if (usePrefix) {
                let p = getRandom(prefixes);
                seq += p;
                currentType = isVowel(p.slice(-1)) ? 'C' : 'V';
            }

            let bodyTarget = targetL - (useSuffix ? 4 : 0); 
            if (bodyTarget < 1) bodyTarget = 1;

            while (seq.length < bodyTarget) {
                if (currentType === 'V') {
                    seq += getRandom([...vowels, ...vowels, ...vowels, ...vowelPairs]); 
                    currentType = 'C';
                } else {
                    let isFirst = (seq.length === 0);
                    if (isFirst) {
                        seq += getRandom([...consonants, ...consonants, ...initialBlends]);
                    } else {
                        seq += getRandom([...consonants, ...consonants, ...medialBlends, ...finalBlends]);
                    }
                    currentType = 'V';
                }
            }

            if (useSuffix) {
                let s = getRandom(suffixes);
                let sStartsVowel = isVowel(s[0]);
                if (currentType === 'V' && sStartsVowel) seq += getRandom(consonants);
                else if (currentType === 'C' && !sStartsVowel) seq += getRandom(vowels);
                seq += s;
            }

            return seq.replace(/q(?!u)/g, 'qu');
        }

        function getPartTargetingLength(targetL) {
            if (targetL <= 0) return "";
            if (targetL === 1) return getRandom(vowels); 
            
            let attempts = 0;
            while (attempts < 10000) {
                attempts++;
                let part = generateRandomSequence(targetL);
                if (part.length === targetL && isLogicalFinal(part)) {
                    return part;
                }
            }
            
            // גיבוי למקרה חירום (סופר קריא: C-V-C-V ללא אותיות כפולות)
            let fb = "";
            let cleanConsonants = ['b','d','f','g','h','k','l','m','n','p','r','s','t','v','z'];
            for(let i=0; i<targetL; i++) {
                if (i%2 === 0) {
                    let nextC = getRandom(cleanConsonants);
                    while(fb.endsWith(nextC)) nextC = getRandom(cleanConsonants);
                    fb += nextC;
                } else {
                    let nextV = getRandom(vowels);
                    while(fb.endsWith(nextV)) nextV = getRandom(vowels);
                    fb += nextV;
                }
            }
            return fb;
        }

        // --- הפונקציה הראשית שמרכיבה את כל הסיסמה ---
        function generateWord() {
            let totalLen = parseInt(document.getElementById('lengthSlider').value, 10);
            const includeSpecialChars = document.getElementById('specialCharsCheckbox').checked;
            const includeNumbers = document.getElementById('numbersCheckbox').checked;
            
            let numStr = "";

            // שלב 1: הוספת מספרים בסוף
            if (includeNumbers) {
                let digits = 0;
                if (totalLen >= 10) digits = 3;
                else if (totalLen >= 7) digits = 2;
                else digits = 1;
                
                // הבטחת מקום למילה (לפחות 4 תווים אם יש מפרידים, אחרת 3)
                if (totalLen - digits < (includeSpecialChars && totalLen >= 6 ? 4 : 3)) {
                    digits = 1;
                }
                
                for(let i=0; i<digits; i++) {
                    numStr += Math.floor(Math.random() * 10).toString();
                }
                totalLen -= digits; 
            }

            let separator = "";
            // שלב 2: שילוב מפרידים (מוצג ופעיל רק מ-6 תווים ומעלה)
            if (includeSpecialChars && totalLen >= 5 && document.getElementById('lengthSlider').value >= 6) {
                // מגוון רחב של מפרידים
                separator = getRandom(['@', '#', '%', '&', '+', '=', '?', '!', '$', '*', '-', '_']);
                totalLen -= 1; 
            }

            let resultWord = "";
            
            // שלב 3: הרכבת חלקי המילה
            if (separator !== "") {
                let p1Len = Math.floor(totalLen / 2);
                let p2Len = totalLen - p1Len;
                
                let p1 = getPartTargetingLength(p1Len);
                let p2 = getPartTargetingLength(p2Len);
                resultWord = p1 + separator + p2;
            } else {
                resultWord = getPartTargetingLength(totalLen);
            }

            resultWord = resultWord.charAt(0).toUpperCase() + resultWord.slice(1);
            return { text: resultWord + numStr };
        }

        // --- חיבור לממשק המשתמש (UI) ---
        
        const generateBtn = document.getElementById('generateBtn');
        const wordOutput = document.getElementById('wordOutput');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const specialCharsCheckbox = document.getElementById('specialCharsCheckbox');
        const numbersCheckbox = document.getElementById('numbersCheckbox');
        const specialCharsWrapper = document.getElementById('specialCharsWrapper');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnLabel = document.getElementById('copyBtnLabel');

        function toggleSpecialCharsVisibility(val) {
            // האפשרות מוסתרת (אך שומרת על המקום) כאשר האורך קטן מ-6
            if (val < 6) {
                specialCharsWrapper.style.visibility = 'hidden';
                specialCharsWrapper.style.pointerEvents = 'none';
            } else {
                specialCharsWrapper.style.visibility = 'visible';
                specialCharsWrapper.style.pointerEvents = 'auto';
            }
        }

        lengthSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value, 10);
            lengthValue.textContent = val;
            toggleSpecialCharsVisibility(val);
            updateUI();
        });

        specialCharsCheckbox.addEventListener('change', updateUI);
        numbersCheckbox.addEventListener('change', updateUI);
        generateBtn.addEventListener('click', updateUI);

        function updateUI() {
            const result = generateWord();
            wordOutput.classList.remove('animate-pop');
            void wordOutput.offsetWidth;
            
            wordOutput.className = 'word-display font-bold text-indigo-900 tracking-tighter break-words w-full mx-auto py-6';
            if (result.text.length <= 10) wordOutput.classList.add('text-5xl', 'md:text-6xl');
            else if (result.text.length <= 18) wordOutput.classList.add('text-4xl', 'md:text-5xl');
            else wordOutput.classList.add('text-3xl', 'md:text-4xl');
            
            wordOutput.textContent = result.text;
            wordOutput.classList.add('animate-pop');
        }

        function copyToClipboard() {
            const text = wordOutput.textContent;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                if (document.execCommand('copy')) {
                    const originalText = copyBtnLabel.textContent;
                    copyBtnLabel.textContent = "Copied!";
                    copyBtn.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                    setTimeout(() => {
                        copyBtnLabel.textContent = originalText;
                        copyBtn.classList.remove('bg-green-50', 'text-green-600', 'border-green-200');
                    }, 1500);
                }
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        copyBtn.addEventListener('click', copyToClipboard);
        
        window.onload = () => {
            const val = parseInt(lengthSlider.value, 10);
            toggleSpecialCharsVisibility(val);
            updateUI();
        };
    </script>
</body>
