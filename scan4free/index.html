<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scan for Free</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .header {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--surface2);
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-count {
    background: var(--surface2); padding: 4px 12px;
    border-radius: 20px; font-size: 13px; color: var(--text-muted);
  }
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  /* Crop */
  #cropScreen { height: calc(100dvh - 53px); }
  #cropContainer {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #000; touch-action: none;
  }
  #cropImage { max-width: 100%; max-height: 100%; user-select: none; -webkit-user-drag: none; }
  #cropCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .corner-handle {
    position: absolute; width: 32px; height: 32px;
    background: var(--primary); border: 3px solid #fff; border-radius: 50%;
    transform: translate(-50%, -50%); cursor: grab; z-index: 10;
    touch-action: none; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .crop-toolbar {
    display: flex; gap: 12px; padding: 16px;
    background: var(--surface); justify-content: center;
  }
  .crop-toolbar button {
    flex: 1; max-width: 160px; padding: 12px 20px; border: none;
    border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel { background: var(--surface2); color: var(--text); }
  .btn-confirm { background: var(--primary); color: #fff; }
  .btn-auto { background: var(--success); color: #fff; }

  /* Pages */
  #pagesScreen { min-height: calc(100dvh - 53px); }
  .pages-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; padding: 16px; flex: 1;
  }
  .page-card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; position: relative; aspect-ratio: 3/4;
    cursor: pointer; transition: transform 0.15s;
  }
  .page-card:active { transform: scale(0.97); }
  .page-card img { width: 100%; height: 100%; object-fit: cover; }
  .page-card .page-num {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(0,0,0,0.7); padding: 2px 10px;
    border-radius: 12px; font-size: 12px; font-weight: 600;
  }
  .page-card .delete-page {
    position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
    border-radius: 50%; border: none; background: rgba(239,68,68,0.9);
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; gap: 12px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; opacity: 0.4; }

  /* Settings */
  .settings-panel {
    padding: 16px; background: var(--surface);
    border-bottom: 1px solid var(--surface2);
  }
  .settings-row {
    display: flex; align-items: center;
    justify-content: space-between; padding: 10px 0;
  }
  .settings-row + .settings-row { border-top: 1px solid var(--surface2); }
  .settings-row label { font-size: 14px; color: var(--text-muted); }
  .settings-row select {
    background: var(--surface2); color: var(--text); border: none;
    padding: 8px 12px; border-radius: 8px; font-size: 14px;
  }
  .toggle { position: relative; width: 48px; height: 28px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider {
    position: absolute; inset: 0; background: var(--surface2);
    border-radius: 14px; transition: background 0.2s;
  }
  .toggle .slider::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-radius: 50%; background: #fff; top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle input:checked + .slider { background: var(--primary); }
  .toggle input:checked + .slider::after { transform: translateX(20px); }
  .bw-options { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  .bw-options.open { max-height: 200px; }
  .bw-mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
  .bw-mode-btn {
    padding: 10px 8px; border: 2px solid var(--surface2); border-radius: 8px;
    background: transparent; color: var(--text-muted); font-size: 12px;
    font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .bw-mode-btn.active {
    border-color: var(--primary); color: var(--text);
    background: rgba(37, 99, 235, 0.15);
  }
  .bw-mode-btn .mode-label { display: block; font-size: 13px; margin-bottom: 2px; }
  .bw-mode-btn .mode-desc { display: block; font-size: 10px; font-weight: 400; opacity: 0.7; }

  /* Bottom bar */
  .bottom-bar {
    padding: 12px 16px; background: var(--surface);
    border-top: 1px solid var(--surface2); display: flex; gap: 12px;
  }
  .bottom-bar button {
    flex: 1; padding: 14px; border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-scan { background: var(--primary); color: #fff; }
  .btn-save { background: var(--success); color: #fff; }
  .btn-save:disabled { opacity: 0.5; }

  /* Overlay / Toast */
  .processing-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; z-index: 1000; gap: 16px;
  }
  .processing-overlay.hidden { display: none; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--surface2); border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface); color: var(--text); padding: 12px 24px;
    border-radius: var(--radius); font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s ease;
    z-index: 1001; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1>Scan for Free</h1>
  <div class="page-count" id="pageCount">0 pages</div>
</div>

<!-- Home Screen -->
<div class="screen active" id="homeScreen">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px;">
    <div style="font-size:72px;">&#128247;</div>
    <div style="text-align:center;">
      <div style="font-size:22px;font-weight:700;margin-bottom:8px;">Scan for Free</div>
      <div style="font-size:14px;color:var(--text-muted);line-height:1.6;">Scan documents, auto-detect edges,<br>and export to PDF.</div>
    </div>
    <button onclick="triggerStillCapture()" style="padding:16px 48px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:280px;">Start Scanning</button>
    <button onclick="showPages()" style="padding:14px 48px;background:var(--surface2);color:var(--text);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:280px;">View Pages</button>
  </div>
</div>


<!-- Crop Screen -->
<div class="screen" id="cropScreen">
  <div id="cropContainer">
    <img id="cropImage">
    <canvas id="cropCanvas"></canvas>
    <div class="corner-handle" id="handleTL" data-corner="0"></div>
    <div class="corner-handle" id="handleTR" data-corner="1"></div>
    <div class="corner-handle" id="handleBR" data-corner="2"></div>
    <div class="corner-handle" id="handleBL" data-corner="3"></div>
  </div>
  <div class="crop-toolbar">
    <button class="btn-cancel" onclick="cancelCrop()">Cancel</button>
    <button class="btn-auto" onclick="autoDetect()">&#9634; Auto</button>
    <button class="btn-confirm" onclick="confirmCrop()">Confirm</button>
  </div>
</div>

<!-- Pages Screen -->
<div class="screen" id="pagesScreen">
  <div class="settings-panel">
    <div class="settings-row">
      <label>Quality</label>
      <select id="qualitySelect" onchange="reprocessPages()">
        <option value="low">Low (fast, small)</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High (best quality)</option>
      </select>
    </div>
    <div class="settings-row" style="flex-wrap:wrap;">
      <label>Black &amp; White</label>
      <label class="toggle">
        <input type="checkbox" id="bwToggle" onchange="toggleBW()">
        <span class="slider"></span>
      </label>
      <div class="bw-options" id="bwOptions">
        <div class="bw-mode-grid">
          <button class="bw-mode-btn active" data-mode="light" onclick="selectBWMode(this)">
            <span class="mode-label">Light</span>
            <span class="mode-desc">Soft, preserve detail</span>
          </button>
          <button class="bw-mode-btn" data-mode="standard" onclick="selectBWMode(this)">
            <span class="mode-label">Standard</span>
            <span class="mode-desc">Balanced</span>
          </button>
          <button class="bw-mode-btn" data-mode="strong" onclick="selectBWMode(this)">
            <span class="mode-label">Strong</span>
            <span class="mode-desc">High contrast</span>
          </button>
          <button class="bw-mode-btn" data-mode="extra" onclick="selectBWMode(this)">
            <span class="mode-label">Extra Strong</span>
            <span class="mode-desc">Text only, clean</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="pages-grid" id="pagesGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">&#128196;</div>
    <p>No pages scanned yet</p>
  </div>
  <div class="bottom-bar">
    <button class="btn-scan" onclick="triggerStillCapture()">&#128247; Scan More</button>
    <button class="btn-save" id="savePdfBtn" onclick="savePDF()" disabled>&#128190; Save PDF</button>
  </div>
</div>

<!-- Still photo capture via native iOS camera -->
<input type="file" id="stillCameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleStillCapture(event)">
<!-- Gallery / file picker -->
<input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileInput(event)">
<canvas id="processCanvas" style="display:none"></canvas>

<div class="processing-overlay hidden" id="processingOverlay">
  <div class="spinner"></div>
  <p id="processingText">Processing...</p>
</div>
<div class="toast" id="toast"></div>

<script>
const { jsPDF } = window.jspdf;

// State
let pages = [];
let currentImage = null;
let currentImageData = null;
let corners = [];
let draggingCorner = -1;
let bwMode = 'light';

const cropImage = document.getElementById('cropImage');
const cropCanvas = document.getElementById('cropCanvas');
const cropCtx = cropCanvas.getContext('2d');
const processCanvas = document.getElementById('processCanvas');
const processCtx = processCanvas.getContext('2d');

// ========== Capture ==========

function triggerStillCapture() {
  document.getElementById('stillCameraInput').click();
}

function handleStillCapture(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => loadImageForCrop(reader.result);
  reader.readAsDataURL(file);
  e.target.value = '';
}

function handleFileInput(e) {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;
  const reader = new FileReader();
  reader.onload = () => loadImageForCrop(reader.result);
  reader.readAsDataURL(files[0]);
  if (files.length > 1) window._pendingFiles = files.slice(1);
  e.target.value = '';
}

// ========== Paper Detection (color-based: find white/light region) ==========

function detectPaperQuad(imageData, w, h) {
  const d = imageData.data;
  const n = w * h;

  // Step 1: Classify each pixel as "paper-like" or not.
  // Paper is bright and has low saturation.
  // We use Lab-like brightness (just luminance) + saturation.
  const brightness = new Uint8Array(n);
  const saturation = new Uint8Array(n);

  for (let i = 0; i < n; i++) {
    const j = i * 4;
    const r = d[j], g = d[j+1], b = d[j+2];
    brightness[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    saturation[i] = max > 0 ? Math.round(((max - min) / max) * 255) : 0;
  }

  // Step 2: Find the brightness threshold that separates paper from background.
  // Use a two-class Otsu on brightness, but only consider low-saturation pixels
  // as potential paper.
  const hist = new Uint32Array(256);
  for (let i = 0; i < n; i++) hist[brightness[i]]++;

  let total = n;
  let sum = 0;
  for (let i = 0; i < 256; i++) sum += i * hist[i];
  let sumB = 0, wB = 0, maxVar = 0, otsuT = 128;
  for (let i = 0; i < 256; i++) {
    wB += hist[i];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += i * hist[i];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const v = wB * wF * (mB - mF) * (mB - mF);
    if (v > maxVar) { maxVar = v; otsuT = i; }
  }

  // Paper threshold: pick the brighter class. Bias higher to avoid
  // picking up the desk/background as "paper".
  // Use max(otsu, 50th percentile) to be robust.
  let cdf = 0;
  let p50 = 128;
  for (let i = 0; i < 256; i++) {
    cdf += hist[i];
    if (cdf >= n * 0.5) { p50 = i; break; }
  }
  const brightThresh = Math.max(otsuT, Math.min(p50 + 20, 200));
  const satThresh = 80; // max saturation for "paper" (0-255 scale)

  // Step 3: Build binary paper mask
  const mask = new Uint8Array(n);
  for (let i = 0; i < n; i++) {
    mask[i] = (brightness[i] >= brightThresh && saturation[i] <= satThresh) ? 1 : 0;
  }

  // Step 4: Morphological close (fill small gaps) then open (remove noise)
  // Use fast box-based approach
  const closed = morphCloseBox(mask, w, h, 2);
  const cleaned = morphOpenBox(closed, w, h, 2);

  // Step 5: Find largest connected component via flood fill
  const labels = new Int32Array(n);
  const sizes = {};
  let nextLabel = 1;

  for (let i = 0; i < n; i++) {
    if (cleaned[i] === 0 || labels[i] !== 0) continue;
    const label = nextLabel++;
    let size = 0;
    const stack = [i];
    labels[i] = label;
    while (stack.length > 0) {
      const ci = stack.pop();
      size++;
      const cx = ci % w, cy = (ci - cx) / w;
      if (cy > 0 && cleaned[ci - w] === 1 && labels[ci - w] === 0) { labels[ci - w] = label; stack.push(ci - w); }
      if (cy < h-1 && cleaned[ci + w] === 1 && labels[ci + w] === 0) { labels[ci + w] = label; stack.push(ci + w); }
      if (cx > 0 && cleaned[ci - 1] === 1 && labels[ci - 1] === 0) { labels[ci - 1] = label; stack.push(ci - 1); }
      if (cx < w-1 && cleaned[ci + 1] === 1 && labels[ci + 1] === 0) { labels[ci + 1] = label; stack.push(ci + 1); }
    }
    sizes[label] = size;
  }

  let bestLabel = 0, bestSize = 0;
  for (const l in sizes) {
    if (sizes[l] > bestSize) { bestSize = sizes[l]; bestLabel = +l; }
  }

  if (bestSize < n * 0.04 || bestSize > n * 0.95) return null;

  // Step 6: Get boundary pixels
  const border = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      if (labels[idx] !== bestLabel) continue;
      if (x === 0 || x === w-1 || y === 0 || y === h-1 ||
          labels[idx-1] !== bestLabel || labels[idx+1] !== bestLabel ||
          labels[idx-w] !== bestLabel || labels[idx+w] !== bestLabel) {
        border.push({ x, y });
      }
    }
  }

  if (border.length < 8) return null;

  // Step 7: Convex hull -> quad
  const hull = convexHull(border);
  if (hull.length < 4) return null;

  let quad = simplifyToQuad(hull);
  if (!quad || quad.length !== 4) return null;

  const area = polyArea(quad);
  if (area < n * 0.04 || area > n * 0.96) return null;

  return orderPoints(quad);
}

// Fast morphological ops using separable box filters
function morphCloseBox(mask, w, h, r) {
  return erodeBox(dilateBox(mask, w, h, r), w, h, r);
}
function morphOpenBox(mask, w, h, r) {
  return dilateBox(erodeBox(mask, w, h, r), w, h, r);
}

function dilateBox(mask, w, h, r) {
  const out = new Uint8Array(w * h);
  // Horizontal pass
  const tmp = new Uint8Array(w * h);
  for (let y = 0; y < h; y++) {
    let count = 0;
    // Init window
    for (let x = 0; x <= r && x < w; x++) count += mask[y * w + x];
    for (let x = 0; x < w; x++) {
      if (x + r < w) count += mask[y * w + x + r];
      tmp[y * w + x] = count > 0 ? 1 : 0;
      if (x - r >= 0) count -= mask[y * w + x - r];
    }
  }
  // Vertical pass
  for (let x = 0; x < w; x++) {
    let count = 0;
    for (let y = 0; y <= r && y < h; y++) count += tmp[y * w + x];
    for (let y = 0; y < h; y++) {
      if (y + r < h) count += tmp[(y + r) * w + x];
      out[y * w + x] = count > 0 ? 1 : 0;
      if (y - r >= 0) count -= tmp[(y - r) * w + x];
    }
  }
  return out;
}

function erodeBox(mask, w, h, r) {
  const side = 2 * r + 1;
  const full = side * side;
  const out = new Uint8Array(w * h);
  const tmp = new Uint8Array(w * h);
  // Horizontal
  for (let y = 0; y < h; y++) {
    let count = 0;
    for (let x = 0; x <= r && x < w; x++) count += mask[y * w + x];
    for (let x = 0; x < w; x++) {
      if (x + r < w) count += mask[y * w + x + r];
      const wSize = Math.min(x, r) + Math.min(w - 1 - x, r) + 1;
      tmp[y * w + x] = count === wSize ? 1 : 0;
      if (x - r >= 0) count -= mask[y * w + x - r];
    }
  }
  // Vertical
  for (let x = 0; x < w; x++) {
    let count = 0;
    for (let y = 0; y <= r && y < h; y++) count += tmp[y * w + x];
    for (let y = 0; y < h; y++) {
      if (y + r < h) count += tmp[(y + r) * w + x];
      const hSize = Math.min(y, r) + Math.min(h - 1 - y, r) + 1;
      out[y * w + x] = count === hSize ? 1 : 0;
      if (y - r >= 0) count -= tmp[(y - r) * w + x];
    }
  }
  return out;
}

// ========== Geometry Helpers ==========

function convexHull(points) {
  if (points.length < 3) return points;
  points.sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lower = [];
  for (const p of points) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = points.length - 1; i >= 0; i--) {
    const p = points[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

function simplifyToQuad(hull) {
  if (hull.length < 4) return null;
  if (hull.length === 4) return hull;
  let eps = 1, result = hull;
  while (result.length > 4 && eps < 500) {
    result = douglasPeucker(hull, eps);
    eps *= 1.4;
  }
  if (result.length < 4) {
    eps /= 1.4;
    result = douglasPeucker(hull, eps / 1.4);
  }
  if (result.length > 4) {
    let best = 0, bestQ = null;
    const n = result.length;
    for (let i = 0; i < n; i++)
      for (let j = i+1; j < n; j++)
        for (let k = j+1; k < n; k++)
          for (let l = k+1; l < n; l++) {
            const q = [result[i], result[j], result[k], result[l]];
            const a = polyArea(q);
            if (a > best) { best = a; bestQ = q; }
          }
    return bestQ;
  }
  return result.length === 4 ? result : null;
}

function douglasPeucker(pts, eps) {
  if (pts.length <= 2) return pts;
  let maxD = 0, maxI = 0;
  for (let i = 1; i < pts.length - 1; i++) {
    const d = ptLineDist(pts[i], pts[0], pts[pts.length-1]);
    if (d > maxD) { maxD = d; maxI = i; }
  }
  if (maxD > eps) {
    const l = douglasPeucker(pts.slice(0, maxI + 1), eps);
    const r = douglasPeucker(pts.slice(maxI), eps);
    return l.slice(0, -1).concat(r);
  }
  return [pts[0], pts[pts.length-1]];
}

function ptLineDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  return Math.abs(dy*p.x - dx*p.y + b.x*a.y - b.y*a.x) / len;
}

function polyArea(pts) {
  let a = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    a += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
  }
  return Math.abs(a) / 2;
}

function orderPoints(pts) {
  const cx = pts.reduce((s, p) => s + p.x, 0) / 4;
  const cy = pts.reduce((s, p) => s + p.y, 0) / 4;
  pts.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));
  let mi = 0, ms = Infinity;
  for (let i = 0; i < 4; i++) {
    const s = pts[i].x + pts[i].y;
    if (s < ms) { ms = s; mi = i; }
  }
  return [0,1,2,3].map(i => pts[(mi + i) % 4]);
}

// ========== Crop Screen ==========

function loadImageForCrop(dataURL) {
  const img = new Image();
  img.onload = () => {
    currentImage = img;
    cropImage.src = dataURL;
    showScreen('cropScreen');

    requestAnimationFrame(() => requestAnimationFrame(() => {
      processCanvas.width = img.width;
      processCanvas.height = img.height;
      processCtx.drawImage(img, 0, 0);
      currentImageData = processCtx.getImageData(0, 0, img.width, img.height);

      // Detect on a downscaled version for speed
      const ds = 400 / Math.max(img.width, img.height);
      const dw = Math.round(img.width * ds);
      const dh = Math.round(img.height * ds);
      const dc = document.createElement('canvas');
      dc.width = dw; dc.height = dh;
      dc.getContext('2d').drawImage(img, 0, 0, dw, dh);
      const dData = dc.getContext('2d').getImageData(0, 0, dw, dh);
      const det = detectPaperQuad(dData, dw, dh);

      if (det) {
        corners = det.map(p => ({ x: Math.round(p.x / ds), y: Math.round(p.y / ds) }));
      } else {
        const m = 0.05;
        corners = [
          { x: img.width * m, y: img.height * m },
          { x: img.width * (1 - m), y: img.height * m },
          { x: img.width * (1 - m), y: img.height * (1 - m) },
          { x: img.width * m, y: img.height * (1 - m) }
        ];
      }
      drawCropOverlay();
      positionHandles();
    }));
  };
  img.src = dataURL;
}

function getImageDisplayRect() {
  const c = document.getElementById('cropContainer');
  const sc = Math.min(c.clientWidth / currentImage.width, c.clientHeight / currentImage.height);
  const dw = currentImage.width * sc, dh = currentImage.height * sc;
  return { ox: (c.clientWidth - dw) / 2, oy: (c.clientHeight - dh) / 2, scale: sc };
}

function imageToScreen(p) {
  const { ox, oy, scale } = getImageDisplayRect();
  return { x: ox + p.x * scale, y: oy + p.y * scale };
}

function screenToImage(p) {
  const { ox, oy, scale } = getImageDisplayRect();
  return {
    x: Math.max(0, Math.min(currentImage.width, (p.x - ox) / scale)),
    y: Math.max(0, Math.min(currentImage.height, (p.y - oy) / scale))
  };
}

function drawCropOverlay() {
  const c = document.getElementById('cropContainer');
  cropCanvas.width = c.clientWidth;
  cropCanvas.height = c.clientHeight;
  cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
  cropCtx.fillStyle = 'rgba(0,0,0,0.5)';
  cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
  const sc = corners.map(c => imageToScreen(c));
  cropCtx.save();
  cropCtx.globalCompositeOperation = 'destination-out';
  cropCtx.beginPath();
  cropCtx.moveTo(sc[0].x, sc[0].y);
  for (let i = 1; i < 4; i++) cropCtx.lineTo(sc[i].x, sc[i].y);
  cropCtx.closePath();
  cropCtx.fill();
  cropCtx.restore();
  cropCtx.beginPath();
  cropCtx.moveTo(sc[0].x, sc[0].y);
  for (let i = 1; i < 4; i++) cropCtx.lineTo(sc[i].x, sc[i].y);
  cropCtx.closePath();
  cropCtx.strokeStyle = '#2563eb';
  cropCtx.lineWidth = 2;
  cropCtx.stroke();
}

function positionHandles() {
  ['handleTL','handleTR','handleBR','handleBL'].forEach((id, i) => {
    const sp = imageToScreen(corners[i]);
    const el = document.getElementById(id);
    el.style.left = sp.x + 'px';
    el.style.top = sp.y + 'px';
  });
}

function setupCornerDragging() {
  document.querySelectorAll('.corner-handle').forEach(h => {
    const start = (e) => { e.preventDefault(); draggingCorner = +h.dataset.corner; };
    h.addEventListener('mousedown', start);
    h.addEventListener('touchstart', start, { passive: false });
  });
  const getPos = (e) => {
    const t = e.touches ? e.touches[0] : e;
    const r = document.getElementById('cropContainer').getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  };
  const move = (e) => {
    if (draggingCorner < 0) return;
    e.preventDefault();
    corners[draggingCorner] = screenToImage(getPos(e));
    drawCropOverlay();
    positionHandles();
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', () => draggingCorner = -1);
  document.addEventListener('touchend', () => draggingCorner = -1);
}

function autoDetect() {
  if (!currentImage) return;
  const ds = 400 / Math.max(currentImage.width, currentImage.height);
  const dw = Math.round(currentImage.width * ds);
  const dh = Math.round(currentImage.height * ds);
  const dc = document.createElement('canvas');
  dc.width = dw; dc.height = dh;
  dc.getContext('2d').drawImage(currentImage, 0, 0, dw, dh);
  const det = detectPaperQuad(dc.getContext('2d').getImageData(0, 0, dw, dh), dw, dh);
  if (det) {
    corners = det.map(p => ({ x: Math.round(p.x / ds), y: Math.round(p.y / ds) }));
    drawCropOverlay();
    positionHandles();
    showToast('Document edges detected');
  } else {
    showToast('Could not detect document');
  }
}

function cancelCrop() { showScreen('homeScreen'); }

async function confirmCrop() {
  showProcessing('Processing...');
  await new Promise(r => setTimeout(r, 50));
  try {
    const cropped = perspectiveTransform(currentImage, corners);
    const bw = document.getElementById('bwToggle').checked;
    const quality = document.getElementById('qualitySelect').value;
    const finalURL = processImage(cropped, bw, bwMode, quality);
    pages.push({ original: currentImage.src, corners: [...corners], cropped: finalURL });
    updatePageCount();
    hideProcessing();
    showToast('Page added');
    if (window._pendingFiles && window._pendingFiles.length > 0) {
      const file = window._pendingFiles.shift();
      const reader = new FileReader();
      reader.onload = () => loadImageForCrop(reader.result);
      reader.readAsDataURL(file);
    } else { showPages(); }
  } catch (e) {
    console.error('confirmCrop error:', e.message, e.stack);
    hideProcessing();
    showToast('Error: ' + e.message);
  }
}

// ========== Perspective Transform ==========

function perspectiveTransform(img, pts) {
  // Output dimensions from quad edge lengths (capped for performance)
  const MAX_SIDE = 2000;
  const outW = Math.max(1, Math.min(MAX_SIDE, Math.round(Math.max(
    Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y),
    Math.hypot(pts[2].x-pts[3].x, pts[2].y-pts[3].y)
  ))));
  const outH = Math.max(1, Math.min(MAX_SIDE, Math.round(Math.max(
    Math.hypot(pts[3].x-pts[0].x, pts[3].y-pts[0].y),
    Math.hypot(pts[2].x-pts[1].x, pts[2].y-pts[1].y)
  ))));

  // Use CSS polygon clip + affine approximation via two triangles drawn with setTransform.
  // This delegates all pixel work to the browser's GPU compositor — near-instant.
  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  const ctx = out.getContext('2d');

  // Source quad corners (TL, TR, BR, BL)
  const s = pts;
  // Destination rectangle corners
  const d = [{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];

  // Draw two triangles (TL-TR-BR and TL-BR-BL) using affine transform per triangle.
  // An affine transform is exact for triangles and the browser does it in GPU.
  function drawTriangle(s0, s1, s2, d0, d1, d2) {
    // Solve 2D affine: [d] = M * [s] + t
    // [d0x d1x d2x]   [a c e]   [s0x s1x s2x]
    // [d0y d1y d2y] = [b d f] * [s0y s1y s2y]
    //                            [1   1   1  ]
    const denom = (s0.x*(s1.y-s2.y) + s1.x*(s2.y-s0.y) + s2.x*(s0.y-s1.y));
    if (Math.abs(denom) < 1e-6) return;
    const a = (d0.x*(s1.y-s2.y) + d1.x*(s2.y-s0.y) + d2.x*(s0.y-s1.y)) / denom;
    const b = (d0.y*(s1.y-s2.y) + d1.y*(s2.y-s0.y) + d2.y*(s0.y-s1.y)) / denom;
    const c = (d0.x*(s2.x-s1.x) + d1.x*(s0.x-s2.x) + d2.x*(s1.x-s0.x)) / denom;
    const dd= (d0.y*(s2.x-s1.x) + d1.y*(s0.x-s2.x) + d2.y*(s1.x-s0.x)) / denom;
    const e = d0.x - a*s0.x - c*s0.y;
    const f = d0.y - b*s0.x - dd*s0.y;

    ctx.save();
    ctx.setTransform(a, b, c, dd, e, f);
    // Clip to destination triangle
    ctx.beginPath();
    ctx.moveTo(s0.x, s0.y);
    ctx.lineTo(s1.x, s1.y);
    ctx.lineTo(s2.x, s2.y);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(img, 0, 0);
    ctx.restore();
  }

  // Triangle 1: TL, TR, BR
  drawTriangle(s[0], s[1], s[2], d[0], d[1], d[2]);
  // Triangle 2: TL, BR, BL
  drawTriangle(s[0], s[2], s[3], d[0], d[2], d[3]);

  return out;
}

function solvePerspective(src, dst) {
  const A = [], b = [];
  for (let i = 0; i < 4; i++) {
    const sx = src[i*2], sy = src[i*2+1], dx = dst[i*2], dy = dst[i*2+1];
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]); b.push(dx);
    A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]); b.push(dy);
  }
  const aug = A.map((r,i) => [...r, b[i]]);
  for (let c = 0; c < 8; c++) {
    let mr = c;
    for (let r = c+1; r < 8; r++) if (Math.abs(aug[r][c]) > Math.abs(aug[mr][c])) mr = r;
    [aug[c], aug[mr]] = [aug[mr], aug[c]];
    const piv = aug[c][c];
    if (Math.abs(piv) < 1e-10) return [1,0,0,0,1,0,0,0];
    for (let j = c; j <= 8; j++) aug[c][j] /= piv;
    for (let r = 0; r < 8; r++) {
      if (r === c) continue;
      const f = aug[r][c];
      for (let j = c; j <= 8; j++) aug[r][j] -= f * aug[c][j];
    }
  }
  return aug.map(r => r[8]);
}

// ========== B&W Processing (Sauvola binarization) ==========

function processImage(canvas, bw, mode, quality) {
  if (bw) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const px = imgData.data;
    const n = w * h;

    // Grayscale
    const gray = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
      const j = i * 4;
      gray[i] = Math.round(0.299 * px[j] + 0.587 * px[j+1] + 0.114 * px[j+2]);
    }

    // Build integral image and integral of squares (for Sauvola)
    const integral = new Float64Array((w+1) * (h+1));
    const integralSq = new Float64Array((w+1) * (h+1));
    for (let y = 1; y <= h; y++) {
      let rowSum = 0, rowSumSq = 0;
      for (let x = 1; x <= w; x++) {
        const v = gray[(y-1)*w+(x-1)];
        rowSum += v;
        rowSumSq += v * v;
        integral[y*(w+1)+x] = integral[(y-1)*(w+1)+x] + rowSum;
        integralSq[y*(w+1)+x] = integralSq[(y-1)*(w+1)+x] + rowSumSq;
      }
    }

    // Sauvola parameters per mode
    // k controls sensitivity: lower k = more pixels become black (more aggressive)
    // windowDiv controls window size: smaller = more local adaptation
    const params = {
      light:    { k: 0.5,  windowDiv: 16, R: 128 },
      standard: { k: 0.3,  windowDiv: 12, R: 128 },
      strong:   { k: 0.15, windowDiv: 10, R: 128 },
      extra:    { k: 0.06, windowDiv: 8,  R: 128 }
    }[mode];

    let winSize = Math.max(11, Math.floor(Math.min(w, h) / params.windowDiv));
    if (winSize % 2 === 0) winSize++;
    const half = winSize >> 1;

    // Sauvola: T(x,y) = mean * (1 + k * (stddev / R - 1))
    // pixel is white if gray > T, else black
    for (let i = 0; i < n; i++) {
      const x = i % w, y = (i - x) / w;
      const x1 = Math.max(0, x - half), y1 = Math.max(0, y - half);
      const x2 = Math.min(w, x + half + 1), y2 = Math.min(h, y + half + 1);
      const area = (x2 - x1) * (y2 - y1);
      const s  = integral[y2*(w+1)+x2] - integral[y1*(w+1)+x2] - integral[y2*(w+1)+x1] + integral[y1*(w+1)+x1];
      const sq = integralSq[y2*(w+1)+x2] - integralSq[y1*(w+1)+x2] - integralSq[y2*(w+1)+x1] + integralSq[y1*(w+1)+x1];
      const mean = s / area;
      const variance = Math.max(0, sq / area - mean * mean);
      const stddev = Math.sqrt(variance);
      const threshold = mean * (1 + params.k * (stddev / params.R - 1));
      const val = gray[i] > threshold ? 255 : 0;
      const j = i * 4;
      px[j] = px[j+1] = px[j+2] = val;
    }

    // Post-processing: remove isolated noise pixels (despeckle)
    if (mode === 'strong' || mode === 'extra') {
      const minNeighbors = mode === 'extra' ? 6 : 7;
      // Remove isolated black dots in white areas
      for (let y = 1; y < h-1; y++) {
        for (let x = 1; x < w-1; x++) {
          const j = (y*w+x)*4;
          if (px[j] === 0) {
            let wn = 0;
            for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
              if (dy===0&&dx===0) continue;
              if (px[((y+dy)*w+(x+dx))*4] === 255) wn++;
            }
            if (wn >= minNeighbors) px[j] = px[j+1] = px[j+2] = 255;
          }
        }
      }
      // Remove isolated white dots in black areas
      for (let y = 1; y < h-1; y++) {
        for (let x = 1; x < w-1; x++) {
          const j = (y*w+x)*4;
          if (px[j] === 255) {
            let bn = 0;
            for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
              if (dy===0&&dx===0) continue;
              if (px[((y+dy)*w+(x+dx))*4] === 0) bn++;
            }
            if (bn >= minNeighbors) px[j] = px[j+1] = px[j+2] = 0;
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
  }

  const jpegQ = { low: 0.5, medium: 0.75, high: 0.95 }[quality] || 0.75;
  return canvas.toDataURL('image/jpeg', jpegQ);
}

// ========== B&W UI ==========

function toggleBW() {
  document.getElementById('bwOptions').classList.toggle('open', document.getElementById('bwToggle').checked);
  reprocessPages();
}

function selectBWMode(btn) {
  document.querySelectorAll('.bw-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  bwMode = btn.dataset.mode;
  reprocessPages();
}

// ========== Pages ==========

function showPages() { showScreen('pagesScreen'); renderPages(); }

function renderPages() {
  const grid = document.getElementById('pagesGrid');
  const empty = document.getElementById('emptyState');
  const saveBtn = document.getElementById('savePdfBtn');
  if (pages.length === 0) {
    grid.style.display = 'none'; empty.style.display = 'flex'; saveBtn.disabled = true; return;
  }
  grid.style.display = 'grid'; empty.style.display = 'none'; saveBtn.disabled = false;
  grid.innerHTML = pages.map((p, i) => `
    <div class="page-card" onclick="previewPage(${i})">
      <img src="${p.cropped}" alt="Page ${i+1}">
      <span class="page-num">${i+1}</span>
      <button class="delete-page" onclick="event.stopPropagation();deletePage(${i})">&#x2715;</button>
    </div>`).join('');
}

function deletePage(i) { pages.splice(i,1); updatePageCount(); renderPages(); showToast('Page removed'); }

function previewPage(i) {
  const o = document.createElement('div');
  o.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  const img = document.createElement('img');
  img.src = pages[i].cropped;
  img.style.cssText = 'max-width:95%;max-height:95%;object-fit:contain;';
  o.appendChild(img); o.onclick = () => o.remove(); document.body.appendChild(o);
}

async function reprocessPages() {
  if (pages.length === 0) return;
  showProcessing('Reprocessing...');
  const bw = document.getElementById('bwToggle').checked;
  const quality = document.getElementById('qualitySelect').value;
  await new Promise(r => setTimeout(r, 50));
  for (let i = 0; i < pages.length; i++) {
    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = pages[i].original; });
    const canvas = perspectiveTransform(img, pages[i].corners);
    pages[i].cropped = processImage(canvas, bw, bwMode, quality);
  }
  renderPages(); hideProcessing(); showToast('Pages reprocessed');
}

// ========== PDF ==========

async function savePDF() {
  if (pages.length === 0) return;
  showProcessing('Generating PDF...');
  await new Promise(r => setTimeout(r, 50));
  try {
    const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
    for (let i = 0; i < pages.length; i++) {
      if (i > 0) pdf.addPage();
      const img = new Image();
      await new Promise(res => { img.onload = res; img.src = pages[i].cropped; });
      const ratio = img.width / img.height;
      let w, h;
      if (ratio > 210/297) { w = 210; h = 210/ratio; } else { h = 297; w = 297*ratio; }
      pdf.addImage(pages[i].cropped, 'JPEG', (210-w)/2, (297-h)/2, w, h);
    }
    const now = new Date();
    const filename = `scan_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}.pdf`;
    const blob = pdf.output('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    hideProcessing(); showToast(`PDF saved — ${pages.length} page(s)`);
  } catch(e) { hideProcessing(); showToast('Error generating PDF'); console.error(e); }
}

// ========== UI ==========

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}


function updatePageCount() {
  const n = pages.length;
  document.getElementById('pageCount').textContent = `${n} page${n!==1?'s':''}`;
  const thumb = document.getElementById('galleryThumb');
  const ctx = thumb.getContext('2d');
  if (n > 0) {
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0,0,44,44);
      const sc = Math.max(44/img.width, 44/img.height);
      ctx.drawImage(img, (44-img.width*sc)/2, (44-img.height*sc)/2, img.width*sc, img.height*sc);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(0,0,44,44);
    };
    img.src = pages[n-1].cropped;
  } else {
    ctx.clearRect(0,0,44,44);
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(0,0,44,44);
  }
}

function showProcessing(t) {
  document.getElementById('processingText').textContent = t;
  document.getElementById('processingOverlay').classList.remove('hidden');
}
function hideProcessing() { document.getElementById('processingOverlay').classList.add('hidden'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== Init ==========
setupCornerDragging();
updatePageCount();
</script>
